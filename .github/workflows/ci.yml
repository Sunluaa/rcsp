name: CI

on:
  push:
    branches:
      - main
      - staging
      - prod
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

  build-image:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:run-$GITHUB_RUN_NUMBER" \
            .
          docker push "$IMAGE_NAME:$IMAGE_TAG"
          docker push "$IMAGE_NAME:run-$GITHUB_RUN_NUMBER"

      - name: Print build release identity
        run: |
          echo "Built image: $IMAGE_NAME:$IMAGE_TAG"
          echo "Build run tag: $IMAGE_NAME:run-$GITHUB_RUN_NUMBER"

  deploy-release:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/prod')
    runs-on: ubuntu-latest
    env:
      RELEASE_ENV: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release metadata
        run: |
          TAG_FILE="deploy/${RELEASE_ENV}.image-tag"
          ENV_FILE="deploy/${RELEASE_ENV}.env"

          if [ ! -f "$TAG_FILE" ]; then
            echo "Missing image tag file: $TAG_FILE" >&2
            exit 1
          fi

          if [ ! -f "$ENV_FILE" ]; then
            echo "Missing environment file: $ENV_FILE" >&2
            exit 1
          fi

          RELEASE_IMAGE_TAG="$(tr -d '\r\n' < "$TAG_FILE")"

          if [ -z "$RELEASE_IMAGE_TAG" ]; then
            echo "Release image tag is empty in $TAG_FILE" >&2
            exit 1
          fi

          if [ "$RELEASE_IMAGE_TAG" = "sha-promote-me" ]; then
            echo "Update $TAG_FILE with an existing image tag built on main before deploying." >&2
            exit 1
          fi

          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "RELEASE_IMAGE_TAG=$RELEASE_IMAGE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_ENV_FILE=$ENV_FILE" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull fixed image
        run: docker pull "$IMAGE_NAME:$RELEASE_IMAGE_TAG"

      - name: Create release network
        run: docker network create release-net

      - name: Start target environment database
        run: |
          docker run -d \
            --name release-postgres \
            --network release-net \
            --network-alias postgres \
            -e POSTGRES_USER=app_user \
            -e POSTGRES_PASSWORD=app_password \
            -e POSTGRES_DB=quotes_db \
            postgres:16-alpine

      - name: Wait for target environment database
        run: |
          until docker exec release-postgres pg_isready -U app_user -d quotes_db; do
            sleep 1
          done

      - name: Run database migrations from the release image
        run: |
          docker run --rm \
            --network release-net \
            --env-file "$RELEASE_ENV_FILE" \
            -e NODE_ENV="$RELEASE_ENV" \
            -e APP_VERSION="$RELEASE_IMAGE_TAG" \
            "$IMAGE_NAME:$RELEASE_IMAGE_TAG" \
            migrate

      - name: Run fixed image with environment config
        run: |
          docker run --rm -d \
            --name release-check \
            --network release-net \
            --env-file "$RELEASE_ENV_FILE" \
            -e NODE_ENV="$RELEASE_ENV" \
            -e APP_VERSION="$RELEASE_IMAGE_TAG" \
            -e RELEASE_IMAGE_TAG="$RELEASE_IMAGE_TAG" \
            -p 8080:8080 \
            "$IMAGE_NAME:$RELEASE_IMAGE_TAG" \
            server

      - name: Verify release identity
        run: |
          until curl -fsS http://localhost:8080/health > health.json; do sleep 1; done
          cat health.json
          grep -q "\"environment\":\"$RELEASE_ENV\"" health.json
          grep -q "\"version\":\"$RELEASE_IMAGE_TAG\"" health.json

      - name: Print release logs
        run: docker logs release-check

      - name: Stop release container
        if: always()
        run: docker stop release-check || true

      - name: Stop target environment database
        if: always()
        run: docker stop release-postgres || true

      - name: Remove release network
        if: always()
        run: docker network rm release-net || true
