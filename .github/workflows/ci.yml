name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: quote-demo-app/package-lock.json

      - name: Install dependencies
        working-directory: quote-demo-app
        run: npm ci

      - name: Lint
        working-directory: quote-demo-app
        run: npm run lint

      - name: Test
        working-directory: quote-demo-app
        run: npm test
