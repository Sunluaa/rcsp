services:
  app:
    build: .
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 15s
    environment:
      NODE_ENV: production
      SERVICE_NAME: quote-demo-app
      PORT: 8080
      APP_VERSION: 1.0.0
      DB_CLIENT: postgres
      DATABASE_URL: postgres://app_user:app_password@postgres:5432/quotes_db
      LOG_LEVEL: info
      SHUTDOWN_DRAIN_MS: 2000
      SHUTDOWN_TIMEOUT_MS: 10000
    ports:
      - "127.0.0.1::8080"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 2s
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: quotes_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d quotes_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
